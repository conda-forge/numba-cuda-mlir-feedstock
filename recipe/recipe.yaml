schema_version: 1

context:
  version: "0.4.1"
  llvm_modern_commit: 3cbe75b1433a90a28db068d700b7effd2de8f401

package:
  name: numba-cuda-mlir
  version: ${{ version }}

source:
  - url: https://github.com/NVIDIA/numba-cuda-mlir/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 77f6c86e5fd086cec89b43b85e2b2c2ed5e0d00e166ab8cfd3bf436daa8d18ee
    target_directory: src
    patches:
      - patches/pin-python-executable.patch
      # Backport NVIDIA/numba-cuda-mlir#226: let `cext` import on CPU-only
      # machines by deferring the CUDA driver load instead of failing hard at
      # import time. Drop once the fix ships in a tagged release.
      - patches/allow-cext-import-without-driver.patch
  - url: https://github.com/llvm/llvm-project/archive/${{ llvm_modern_commit }}.tar.gz
    sha256: a2d6587b0793f7f6fb21c4607e6d86cd40377686f58162fbae5e206d2e24dfe2
    target_directory: llvm-modern-src

build:
  number: 0
  skip:
    - not (linux or win)
    - match(python, "<3.11")
    - cuda_compiler_version != "None"
  script:
    file: ${{ "build.bat" if win else "build.sh" }}
    env:
      NUMBA_CUDA_MLIR_VERSION: ${{ version }}
  # The CUDA runtime libraries (cudart, nvrtc, nvjitlink, nvvm) are dlopen'd at
  # runtime, not link time linked, and the bundled legacy-LLVM library (libLLVM-7.so
  # on unix / LLVM-C.dll on win) and MLIR C-API modules are loaded dynamically,
  # exempt them from the link checks.
  dynamic_linking:
    overdepending_behavior: ignore
    missing_dso_allowlist:
      - if: unix
        then:
          - '*/libLLVM-7.so'
          - '*/libMLIRPythonCAPI.so'
          - '*/libMLIRPythonSupport-numba_cuda_mlir.so'
      - if: win
        then:
          - '**/LLVM-C.dll'
          - '**/MLIRPythonCAPI.dll'
          - '**/MLIRModernToNVVM.dll'
          - '**/MLIRPythonSupport-numba_cuda_mlir.dll'
          - '**/nanobind-numba_cuda_mlir.dll'

requirements:
  ignore_run_exports:
    by_name:
      - cuda-cudart
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake >=3.24
    - ninja
    - if: unix
      then: make
    - sccache  # Add sccache to speed up local debug builds for humans
  host:
    - python
    - pip
    - setuptools >=64
    - wheel
    # Build deps for the modern LLVM/MLIR Python bindings:
    - numpy
    - pybind11
    # nanobind >2.13 breaks numba-cuda-mlir's MLIR bindings
    - nanobind >=2.9,<2.13
    - dlpack
    # zlib: on unix modern LLVM/MLIR links it dynamically (libMLIRPythonCAPI.so);
    # on win it provides the import lib that LLVM-C.dll links zlib against.
    - zlib
    # zstd: only unix links it (modern LLVM/MLIR). The win LLVM build disables
    # zstd and LLVM 7 predates zstd, so nothing on win needs it.
    - if: unix
      then: zstd
    # CUDA headers only (no nvcc). numba-cuda-mlir handles CUDA ABI compat at
    # runtime, so the build-time CUDA version is not significant. NVRTC/nvJitLink
    # headers aren't needed at build time (those libraries are dlopen'd).
    - cuda-version 13.*
    - cuda-cudart-dev
    # cuda-driver-dev (cuda.h + libcuda stub) is unix-only on conda-forge; on
    # win-64 cuda.h ships in cuda-cudart-dev, which satisfies FindCUDAToolkit.
    - if: unix
      then: cuda-driver-dev
    - cuda-crt-dev_${{ target_platform }}
    - cuda-cccl
    # unix: prebuilt shared libLLVM-7.1.so (symlinked to libLLVM-7.so at runtime).
    # win: LLVM 7 ships only as static libs; build.bat synthesizes LLVM-C.dll from
    # them and bundles it into the wheel (see build_llvm_c_dll.py).
    - if: unix
      then: libllvm7.1
    - if: win
      then: llvmdev 7.1.*
  run:
    - python
    - numpy
    - if: match(python, "<3.12")
      then: typing-extensions
    # zstd is only linked by the unix LLVM/MLIR build (see host note).
    - if: unix
      then: zstd
    - packaging
    - cuda-version >=12.2,<14.0.0a0
    - cuda-cudart
    - cuda-nvrtc
    - libnvjitlink >=12.3.0
    - cuda-nvvm-impl
    - cuda-cccl
    - cuda-bindings >=12.9.1,<14.0.0
    - cuda-core >=0.5.1,<2.0.0
    # win bundles LLVM-C.dll inside the wheel, so no runtime LLVM dep there.
    - if: unix
      then: libllvm7.1

tests:
  - python:
      imports:
        - numba_cuda_mlir
        - numba_cuda_mlir._mlir.ir
      pip_check: true
  - script:
      - python -c "import numba_cuda_mlir; from numba_cuda_mlir import cuda"
      # Confirm the bundled native libraries are present and located.
      - if: linux
        then:
          - python -c "import numba_cuda_mlir._mlir._mlir_libs as L, os; assert os.path.exists(os.path.join(os.path.dirname(L.__file__), 'libMLIRPythonCAPI.so'))"
          - python -c "import numba_cuda_mlir, os; assert os.path.exists(os.path.join(os.path.dirname(numba_cuda_mlir.__file__), 'lib', 'libLLVM-7.so'))"
      - if: win
        then:
          - python -c "import numba_cuda_mlir._mlir._mlir_libs as L, os; assert os.path.exists(os.path.join(os.path.dirname(L.__file__), 'MLIRPythonCAPI.dll'))"
          - python -c "import numba_cuda_mlir, os; assert os.path.exists(os.path.join(os.path.dirname(numba_cuda_mlir.__file__), 'lib', 'LLVM-C.dll'))"

about:
  homepage: https://github.com/NVIDIA/numba-cuda-mlir
  license: Apache-2.0 AND Apache-2.0 WITH LLVM-exception AND NCSA
  license_file:
    - src/LICENSE
    - src/THIRD-PARTY-LICENSES
  summary: numba-cuda-mlir Python Compiler (MLIR/LLVM CUDA kernel backend)
  repository: https://github.com/NVIDIA/numba-cuda-mlir

extra:
  recipe-maintainers:
    - conda-forge/cuda-python
    - brandon-b-miller
